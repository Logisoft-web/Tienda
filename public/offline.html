<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#FF6B35" />
  <title>Sin conexión — Enjoy Cheladas POS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .card {
      text-align: center;
      padding: 2.5rem 2rem;
      max-width: 340px;
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      display: block;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: #FF6B35;
    }
    p {
      color: rgba(255,255,255,0.6);
      font-size: 0.9rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    button {
      background: linear-gradient(135deg, #FF6B35, #F7931E);
      color: white;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    .hint {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="icon">📡</span>
    <h1>Sin conexión</h1>
    <p>Verifica tu conexión a internet e intenta nuevamente. Las ventas en proceso se guardarán cuando te reconectes.</p>
    <button onclick="window.location.reload()">Reintentar</button>
    <p class="hint">Enjoy Cheladas POS · Modo offline</p>
  </div>
</body>
</html>
